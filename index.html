    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --gold:      #C9A84C;
      --gold-lt:   #E2C97E;
      --gold-dim:  rgba(201,168,76,0.18);
      --gold-line: rgba(201,168,76,0.35);
      --dark:      #0B0A09;
      --dark2:     #131210;
      --dark3:     #1A1816;
      --text:      #EDE8DF;
      --muted:     rgba(237,232,223,0.55);
      --faint:     rgba(237,232,223,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content:'';
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        linear-gradient(134deg, transparent 0%, rgba(201,168,76,0.03) 30%, transparent 55%),
        linear-gradient(210deg, transparent 20%, rgba(255,255,255,0.015) 50%, transparent 70%),
        linear-gradient( 60deg, transparent 40%, rgba(201,168,76,0.025) 65%, transparent 80%);
    }

    /* NAV */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:999;
      padding: 1.3rem 6vw;
      display: flex; align-items:center; justify-content:space-between;
      background: linear-gradient(to bottom, rgba(11,10,9,0.97) 60%, transparent);
      border-bottom: 1px solid transparent;
      transition: border-color 0.4s;
    }
    nav.scrolled { border-color: var(--gold-line); }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text); text-decoration: none;
    }
    .nav-brand em { font-style:normal; color: var(--gold); }

    .nav-center { display:flex; gap:2.2rem; list-style:none; }
    .nav-center a {
      font-size: 0.66rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.3s;
    }
    .nav-center a:hover { color: var(--gold); }

    .lang-switcher {
      display: flex; gap: 0.5rem; align-items: center;
    }
    .lang-switcher span { color: var(--gold-line); font-size: 0.65rem; }
    .lang-btn {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 0.2rem 0.1rem;
      transition: color 0.3s;
    }
    .lang-btn:hover { color: var(--gold-lt); }
    .lang-btn.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

    /* HERO */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 8rem 6vw 6rem; overflow: hidden;
    }
    .hero::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 70% 55% at 50% 48%, rgba(201,168,76,0.06) 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { opacity:0.6; transform:scale(1); }
      to   { opacity:1;   transform:scale(1.06); }
    }

    .hero-eyebrow {
      font-size:0.62rem; font-weight:500; letter-spacing:0.4em;
      text-transform:uppercase; color:var(--gold); margin-bottom:1.6rem;
      opacity:0; animation:fadeUp 0.9s ease forwards 0.3s;
    }
    .hero-title {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3.4rem,8vw,7.5rem);
      font-weight:300; line-height:1; letter-spacing:0.04em;
      opacity:0; animation:fadeUp 1s ease forwards 0.5s;
    }
    .hero-title em { font-style:italic; color:var(--gold); font-weight:300; }
    .hero-sub {
      margin-top:1.5rem; font-size:0.74rem; font-weight:300;
      letter-spacing:0.28em; text-transform:uppercase; color:var(--muted);
      opacity:0; animation:fadeUp 1s ease forwards 0.7s;
    }
    .hero-divider {
      margin:2.8rem auto; width:1px; height:60px;
      background:linear-gradient(to bottom, transparent, var(--gold), transparent);
      opacity:0; animation:fadeUp 1s ease forwards 0.9s;
    }
    .hero-tagline {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(1rem,2vw,1.3rem);
      font-weight:300; font-style:italic; color:var(--muted);
      max-width:580px; line-height:1.7;
      opacity:0; animation:fadeUp 1s ease forwards 1.1s;
    }
    .hero-cta {
      display:flex; gap:1.4rem; margin-top:3rem;
      opacity:0; animation:fadeUp 1s ease forwards 1.3s;
      flex-wrap:wrap; justify-content:center;
    }

    .btn {
      display:inline-block; font-family:'Raleway',sans-serif;
      font-size:0.65rem; font-weight:500;
      letter-spacing:0.28em; text-transform:uppercase;
      padding:0.85rem 2.4rem; text-decoration:none; transition:all 0.35s;
    }
    .btn-gold { background:var(--gold); color:var(--dark); }
    .btn-gold:hover { background:var(--gold-lt); transform:translateY(-2px); }
    .btn-outline { border:1px solid var(--gold-line); color:var(--gold); }
    .btn-outline:hover { background:var(--gold-dim); border-color:var(--gold); transform:translateY(-2px); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .scroll-hint {
      position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:0.5rem;
      font-size:0.55rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--faint);
      animation:fadeUp 1s ease forwards 1.6s; opacity:0;
    }
    .scroll-hint span {
      width:1px; height:36px;
      background:linear-gradient(to bottom, var(--gold-line), transparent);
      animation:scrollLine 2s ease infinite;
    }
    @keyframes scrollLine {
      0%   { transform:scaleY(0); transform-origin:top; }
      50%  { transform:scaleY(1); transform-origin:top; }
      51%  { transform:scaleY(1); transform-origin:bottom; }
      100% { transform:scaleY(0); transform-origin:bottom; }
    }

    /* SECTIONS */
    section { position:relative; z-index:1; }
    .section-inner { max-width:1140px; margin:0 auto; padding:0 6vw; }
    .section-border { width:50px; height:1px; background:var(--gold); margin-bottom:1.2rem; }
    .section-label {
      font-size:0.6rem; letter-spacing:0.38em; text-transform:uppercase;

    .section-title {

      font-weight:300; line-height:1.15;

    .section-title em { font-style:italic; color:var(--gold); }

    /* VENTURES */

    .ventures-grid {

      font-size:4rem; font-weight:300; color:var(--gold-dim); line-height:1;

    .venture-icon { width:52px; height:52px; margin-bottom:1.8rem; opacity:0.85; }
    .venture-label {
      font-size:0.6rem; letter-spacing:0.32em; text-transform:uppercase;
      color:var(--gold); margin-bottom:0.7rem;

    .venture-name {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(1.7rem,3vw,2.4rem);

    .venture-desc {

      line-height:1.85; color:var(--muted); margin-bottom:2rem;

    .venture-services { list-style:none; margin-bottom:2.4rem; }

    }
    .venture-services li::before {
      content:''; width:18px; height:1px; background:var(--gold); flex-shrink:0;
    }
    .venture-link {
      display:inline-flex; align-items:center; gap:0.7rem;
      font-size:0.65rem; font-weight:500;
      letter-spacing:0.25em; text-transform:uppercase;
      color:var(--gold); text-decoration:none;
      border-bottom:1px solid var(--gold-line); padding-bottom:0.3rem;
      transition:border-color 0.3s, gap 0.3s;
    }
    .venture-link:hover { border-color:var(--gold); gap:1.1rem; }
    .venture-link svg { transition:transform 0.3s; }
    .venture-link:hover svg { transform:translateX(4px); }

    /* CONTACT */
    .contact { padding:8rem 0; background:var(--dark); text-align:center; }
    .contact-inner { max-width:700px; margin:0 auto; padding:0 6vw; }
    .contact-inner .section-border { margin:0 auto 1.2rem; }
    .contact-tagline {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(1.3rem,2.5vw,1.9rem);
      font-weight:300; font-style:italic;
      color:var(--muted); margin:1.5rem 0 3.5rem; line-height:1.6;
    }
    .contact-links {
      display:flex; justify-content:center;
      gap:3rem; flex-wrap:wrap; margin-bottom:3.5rem;
    }
    .contact-item { display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
    .contact-item-label {

    }
    .contact-item-val {

    }
    .contact-item-val:hover { color:var(--gold); }
    .contact-divider {
      width:100%; height:1px;
      background:linear-gradient(to right, transparent, var(--gold-line), transparent);

      padding:2.5rem 6vw;

    .footer-brand {

      font-size:1.1rem; font-weight:600;
      letter-spacing:0.15em; text-transform:uppercase; color:var(--text);

    .footer-copy { font-size:0.62rem; letter-spacing:0.12em; color:var(--faint); font-weight:300; }
    .footer-sites { display:flex; gap:1.8rem; list-style:none; }
    .footer-sites a {
      font-size:0.62rem; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--muted);
      text-decoration:none; transition:color 0.3s;
    }
    .footer-sites a:hover { color:var(--gold); }

    /* RESPONSIVE */
    @media(max-width:900px){
      .ventures-grid { grid-template-columns:1fr; }
      .ventures-sep { display:none; }
      .venture-card { padding:3rem 0 0; border-top:1px solid var(--gold-line); }
      .venture-card:first-child { border-top:none; padding-top:0; }
    }
    @media(max-width:760px){
      .nav-center { display:none; }
      footer { flex-direction:column; text-align:center; gap:1.5rem; }
    }
  </style>

<script>
  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;
    const t = T[lang];

    // Update language buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', 
        (btn.textContent === 'ENG' && lang === 'en') ||
        (btn.textContent === 'РУС' && lang === 'ru') ||
        (btn.textContent === 'MNE' && lang === 'me')
      );
    });

    // Nav
    const navContainer = document.getElementById('nav-links');
    navContainer.innerHTML = t.nav.map((text, i) => {
      const id = i === 0 ? '#ventures' : '#contact';
      return `<li><a href="${id}">${text}</a></li>`;
    }).join('');

    // Hero
    document.getElementById('hero-eyebrow').textContent = t.hero_eyebrow;
    document.getElementById('hero-title').innerHTML = t.hero_title.join('<br>');
    document.getElementById('hero-sub').textContent = t.hero_sub;
    document.getElementById('hero-tagline').textContent = t.hero_tagline;
    document.getElementById('hero-btn1').textContent = t.hero_btn1;
    document.getElementById('hero-btn2').textContent = t.hero_btn2;
    document.getElementById('scroll-label').textContent = t.scroll;

    // Ventures
    document.getElementById('sec-ventures-label').textContent = t.sec_ventures_label;
    document.getElementById('sec-ventures-title').innerHTML = t.sec_ventures_title;

    document.getElementById('v1-label').textContent = t.v1_label;
    document.getElementById('v1-name').innerHTML = t.v1_name;
    document.getElementById('v1-desc').textContent = t.v1_desc;
    document.getElementById('v1-link-text').textContent = t.v1_link;
    document.getElementById('v1-services').innerHTML = t.v1_services.map(s => `<li>${s}</li>`).join('');

    document.getElementById('v2-label').textContent = t.v2_label;
    document.getElementById('v2-name').innerHTML = t.v2_name;
    document.getElementById('v2-desc').textContent = t.v2_desc;
    document.getElementById('v2-link-text').textContent = t.v2_link;
    document.getElementById('v2-services').innerHTML = t.v2_services.map(s => `<li>${s}</li>`).join('');

    document.getElementById('v3-label').textContent = t.v3_label;
    document.getElementById('v3-name').innerHTML = t.v3_name;
    document.getElementById('v3-desc').textContent = t.v3_desc;
    document.getElementById('v3-link-text').textContent = t.v3_link;
    document.getElementById('v3-services').innerHTML = t.v3_services.map(s => `<li>${s}</li>`).join('');

    // Contact
    document.getElementById('sec-contact-label').textContent = t.sec_contact_label;
    document.getElementById('sec-contact-title').innerHTML = t.sec_contact_title;
    document.getElementById('contact-tagline').innerHTML = t.contact_tagline;

    t.contact_labels.forEach((label, i) => {
      const el = document.getElementById(`cl${i}`);
      if (el) el.textContent = label;
    });

    document.getElementById('contact-location').textContent = t.contact_location;
    document.getElementById('btn-ncg').textContent = t.btn_ncg;
    document.getElementById('btn-mrm').textContent = t.btn_mrm;
    document.getElementById('btn-mcm').textContent = t.btn_mcm;
    document.getElementById('footer-copy').textContent = t.footer_copy;

    // Set language attribute
    document.documentElement.lang = lang === 'ru' ? 'ru' : lang === 'me' ? 'sr' : 'en';
  }

  // Nav scroll effect
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
  });

  // Initialize
  setLang('en');
</script>
